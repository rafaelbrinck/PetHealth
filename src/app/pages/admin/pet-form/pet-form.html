<div class="space-y-6 md:space-y-8">
  <div class="space-y-1">
    <h1 class="text-2xl font-bold text-slate-800">Novo Pet</h1>
    <p class="text-slate-500 text-sm">Cadastre um novo animal para acompanhar a saúde dele.</p>
  </div>

  @if (error) {
    <div class="p-3 rounded-xl bg-red-50 text-red-600 text-sm border border-red-100">
      {{ error }}
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label for="name" class="block text-sm font-medium text-slate-700 mb-1.5">Nome</label>
      <input
        id="name"
        type="text"
        formControlName="name"
        class="w-full px-4 py-3 min-h-[48px] rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm"
        placeholder="Ex: Luna"
      />
      @if (getFieldError('name')) {
        <p class="mt-1 text-xs text-red-600">{{ getFieldError('name') }}</p>
      }
    </div>

    <div>
      <label for="species" class="block text-sm font-medium text-slate-700 mb-1.5">Espécie</label>
      <input
        id="species"
        type="text"
        formControlName="species"
        class="w-full px-4 py-3 min-h-[48px] rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm"
        placeholder="Cachorro, Gato..."
      />
      @if (getFieldError('species')) {
        <p class="mt-1 text-xs text-red-600">{{ getFieldError('species') }}</p>
      }
    </div>

    <div>
      <label for="breed" class="block text-sm font-medium text-slate-700 mb-1.5">Raça (opcional)</label>
      <input
        id="breed"
        type="text"
        formControlName="breed"
        class="w-full px-4 py-3 min-h-[48px] rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm"
        placeholder="Ex: Golden Retriever"
      />
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label for="birth_date" class="block text-sm font-medium text-slate-700 mb-1.5">
          Data de nascimento
        </label>
        <input
          id="birth_date"
          type="date"
          formControlName="birth_date"
          class="w-full px-4 py-3 min-h-[48px] rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm"
        />
      </div>

      <div>
        <label for="gender" class="block text-sm font-medium text-slate-700 mb-1.5">Gênero</label>
        <select
          id="gender"
          formControlName="gender"
          class="w-full px-4 py-3 min-h-[48px] rounded-xl border border-slate-200 bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm"
        >
          <option value="" disabled selected>Selecione</option>
          <option value="F">Fêmea</option>
          <option value="M">Macho</option>
          <option value="O">Outro</option>
        </select>
        @if (getFieldError('gender')) {
          <p class="mt-1 text-xs text-red-600">{{ getFieldError('gender') }}</p>
        }
      </div>
    </div>

    <div class="pt-2 flex flex-col gap-3 sm:flex-row sm:justify-end">
      <a
        routerLink="/admin/pets"
        class="inline-flex items-center justify-center w-full sm:w-auto px-4 py-3 min-h-[48px] rounded-xl border border-slate-200 text-slate-700 text-sm font-medium hover:bg-slate-50 transition-colors"
      >
        Cancelar
      </a>
      <button
        type="submit"
        [disabled]="loading"
        class="inline-flex items-center justify-center w-full sm:w-auto px-4 py-3 min-h-[48px] rounded-xl bg-indigo-600 text-white text-sm font-medium shadow-sm hover:bg-indigo-700 disabled:bg-indigo-400 transition-colors"
      >
        {{ loading ? 'Salvando...' : 'Salvar pet' }}
      </button>
    </div>
  </form>
</div>
