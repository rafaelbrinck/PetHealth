<div class="relative max-w-md mx-auto p-8 sm:p-12 bg-white/80 backdrop-blur-2xl rounded-[3rem] shadow-[0_8px_40px_rgba(0,0,0,0.04)] border border-white/60 overflow-hidden">
  
  <div class="absolute -top-24 -right-24 w-72 h-72 bg-emerald-400/20 rounded-full blur-[80px] pointer-events-none"></div>
  <div class="absolute -bottom-24 -left-24 w-72 h-72 bg-indigo-400/20 rounded-full blur-[80px] pointer-events-none"></div>

  <div class="relative z-10">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center p-3 bg-gradient-to-br from-indigo-100 to-violet-50 text-indigo-600 rounded-2xl shadow-sm border border-white mb-4 rotate-3 hover:rotate-0 transition-transform duration-300">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      </div>
      <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">A família cresceu!</h2>
      <p class="text-slate-500 font-medium">Falta muito pouco para você assumir o controle total.</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      @if (error) {
        <div class="flex items-center gap-3 p-4 rounded-2xl bg-rose-500/10 text-rose-700 animate-fade-in-up">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          <p class="text-sm font-bold">{{ error }}</p>
        </div>
      }

      <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none transition-colors group-focus-within:text-indigo-600 text-slate-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </div>
        <input
          id="fullName"
          type="text"
          [(ngModel)]="fullName"
          name="fullName"
          required
          class="w-full pl-12 pr-6 py-4 bg-slate-50/50 hover:bg-slate-50 border border-slate-200/80 rounded-full text-slate-900 placeholder:text-slate-400 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-medium"
          placeholder="Seu nome ou apelido"
        />
      </div>

      <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none transition-colors group-focus-within:text-indigo-600 text-slate-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
        </div>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          class="w-full pl-12 pr-6 py-4 bg-slate-50/50 hover:bg-slate-50 border border-slate-200/80 rounded-full text-slate-900 placeholder:text-slate-400 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-medium"
          placeholder="E-mail principal"
        />
      </div>

      <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none transition-colors group-focus-within:text-indigo-600 text-slate-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          class="w-full pl-12 pr-6 py-4 bg-slate-50/50 hover:bg-slate-50 border border-slate-200/80 rounded-full text-slate-900 placeholder:text-slate-400 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-medium"
          placeholder="Crie uma senha forte"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full relative overflow-hidden group flex justify-center items-center gap-2 py-4 px-6 mt-6 bg-gradient-to-r from-indigo-600 to-violet-500 hover:from-indigo-500 hover:to-violet-400 disabled:from-slate-400 disabled:to-slate-400 disabled:cursor-wait text-white font-bold text-lg rounded-full shadow-[0_8px_20px_rgba(79,70,229,0.3)] hover:shadow-[0_12px_25px_rgba(79,70,229,0.4)] hover:-translate-y-0.5 transition-all duration-300"
      >
        <div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-white/20 to-transparent group-hover:animate-[shimmer_1.5s_infinite]"></div>
        
        @if (loading) {
          <svg class="animate-spin h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        } @else {
          <span class="relative z-10">Concluir Cadastro</span>
          <svg class="w-5 h-5 relative z-10 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        }
      </button>
    </form>

    <div class="mt-8 pt-6 border-t border-slate-200/60 text-center">
      <p class="text-slate-500 font-medium">
        Já tem uma conta? 
        <a routerLink="/login" class="text-indigo-600 hover:text-indigo-700 font-extrabold ml-1 relative inline-block after:content-[''] after:absolute after:w-full after:scale-x-0 after:h-0.5 after:-bottom-1 after:left-0 after:bg-indigo-600 after:origin-bottom-right after:transition-transform hover:after:scale-x-100 hover:after:origin-bottom-left">Acessar painel</a>
      </p>
    </div>
  </div>
</div>

<style>
  @keyframes shimmer { 100% { transform: translateX(100%); } }
</style>
