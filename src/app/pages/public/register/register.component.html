<h2 class="text-2xl font-semibold text-slate-800 mb-6">Criar conta</h2>
<form (ngSubmit)="onSubmit()" class="space-y-5">
  @if (error) {
    <div class="p-3 rounded-xl bg-red-50 text-red-600 text-sm">
      {{ error }}
    </div>
  }
  <div>
    <label for="fullName" class="block text-sm font-medium text-slate-700 mb-1.5">Nome completo</label>
    <input
      id="fullName"
      type="text"
      [(ngModel)]="fullName"
      name="fullName"
      required
      class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
      placeholder="Seu nome"
    />
  </div>
  <div>
    <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">E-mail</label>
    <input
      id="email"
      type="email"
      [(ngModel)]="email"
      name="email"
      required
      class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
      placeholder="seu@email.com"
    />
  </div>
  <div>
    <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Senha</label>
    <input
      id="password"
      type="password"
      [(ngModel)]="password"
      name="password"
      required
      class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
      placeholder="••••••••"
    />
  </div>
  <button
    type="submit"
    [disabled]="loading"
    class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white font-medium rounded-xl shadow-sm transition-colors"
  >
    {{ loading ? 'Cadastrando...' : 'Cadastrar' }}
  </button>
</form>
<p class="mt-6 text-center text-slate-600 text-sm">
  Já tem conta?
  <a routerLink="/login" class="text-indigo-600 hover:text-indigo-700 font-medium">Entrar</a>
</p>
