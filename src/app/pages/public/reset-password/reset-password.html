<div class="relative max-w-md mx-auto p-8 sm:p-12 bg-white/80 backdrop-blur-2xl rounded-[3rem] shadow-[0_8px_40px_rgba(0,0,0,0.04)] border border-white/60 overflow-hidden">
  
  <div class="absolute -top-24 -right-24 w-64 h-64 bg-emerald-400/20 rounded-full blur-[80px] pointer-events-none"></div>
  <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-sky-400/20 rounded-full blur-[80px] pointer-events-none"></div>

  <div class="relative z-10">
    <div class="w-16 h-16 bg-gradient-to-br from-emerald-100 to-sky-50 rounded-2xl flex items-center justify-center mb-8 mx-auto shadow-sm border border-white rotate-3 hover:rotate-0 transition-transform duration-300">
      <span class="text-3xl">✨</span>
    </div>

    <div class="text-center mb-10">
      <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-3">Criar nova senha</h2>
      <p class="text-slate-500 font-medium">Você está a um passo de voltar ao painel dos seus pets.</p>
    </div>

    @if (success) {
      <div class="text-center bg-emerald-50 border border-emerald-100 p-6 rounded-3xl animate-fade-in-up">
        <div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h3 class="font-bold text-slate-900 mb-2">Senha atualizada!</h3>
        <p class="text-slate-600 text-sm">Sua nova senha foi salva com sucesso. Redirecionando para o login...</p>
      </div>
    } @else {
      <form (ngSubmit)="onSubmit()" class="space-y-5">
        @if (error) {
          <div class="flex items-center gap-3 p-4 rounded-2xl bg-rose-500/10 text-rose-700 animate-fade-in-up">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <p class="text-sm font-bold">{{ error }}</p>
          </div>
        }

        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none transition-colors group-focus-within:text-emerald-500 text-slate-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </div>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            required
            class="w-full pl-12 pr-6 py-4 bg-slate-50/50 hover:bg-slate-50 border border-slate-200/80 rounded-full text-slate-900 placeholder:text-slate-400 focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition-all font-medium"
            placeholder="Nova senha"
          />
        </div>

        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none transition-colors group-focus-within:text-emerald-500 text-slate-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
          </div>
          <input
            id="confirmPassword"
            type="password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            required
            class="w-full pl-12 pr-6 py-4 bg-slate-50/50 hover:bg-slate-50 border border-slate-200/80 rounded-full text-slate-900 placeholder:text-slate-400 focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition-all font-medium"
            placeholder="Confirme a nova senha"
          />
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="w-full relative overflow-hidden group flex justify-center items-center gap-2 py-4 px-6 mt-6 bg-slate-900 hover:bg-emerald-500 disabled:bg-slate-300 disabled:cursor-wait text-white font-bold text-lg rounded-full shadow-[0_8px_20px_rgba(0,0,0,0.15)] hover:shadow-[0_12px_25px_rgba(16,185,129,0.3)] hover:-translate-y-0.5 transition-all duration-300"
        >
          <div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-white/20 to-transparent group-hover:animate-[shimmer_1.5s_infinite]"></div>
          @if (loading) {
            <svg class="animate-spin h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          } @else {
            <span class="relative z-10">Atualizar Senha</span>
          }
        </button>
      </form>
    }
  </div>
</div>
