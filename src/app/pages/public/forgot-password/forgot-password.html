<div class="relative max-w-md mx-auto p-8 sm:p-12 bg-white/80 backdrop-blur-2xl rounded-[3rem] shadow-[0_8px_40px_rgba(0,0,0,0.04)] border border-white/60 overflow-hidden">
  
  <div class="absolute -top-24 -left-24 w-64 h-64 bg-amber-400/20 rounded-full blur-[80px] pointer-events-none"></div>
  <div class="absolute -bottom-24 -right-24 w-64 h-64 bg-rose-400/20 rounded-full blur-[80px] pointer-events-none"></div>

  <div class="relative z-10">
    <div class="w-16 h-16 bg-gradient-to-br from-amber-100 to-orange-50 rounded-2xl flex items-center justify-center mb-8 mx-auto shadow-sm border border-white rotate-3 hover:rotate-0 transition-transform duration-300">
      <span class="text-3xl">🔑</span>
    </div>

    <div class="text-center mb-10">
      <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-3">Esqueceu a senha?</h2>
      <p class="text-slate-500 font-medium">Acontece nas melhores famílias! Digite seu e-mail e enviaremos um link de acesso.</p>
    </div>

    @if (success) {
      <div class="text-center bg-emerald-50 border border-emerald-100 p-6 rounded-3xl animate-fade-in-up">
        <div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h3 class="font-bold text-slate-900 mb-2">E-mail enviado!</h3>
        <p class="text-slate-600 text-sm mb-6">Verifique sua caixa de entrada (e o spam) para redefinir sua senha.</p>
        <a routerLink="/login" class="inline-block bg-white border border-slate-200 text-slate-700 font-bold px-6 py-3 rounded-full hover:bg-slate-50 transition-colors shadow-sm">
          Voltar para o Login
        </a>
      </div>
    } @else {
      <form (ngSubmit)="onSubmit()" class="space-y-5">
        @if (error) {
          <div class="flex items-center gap-3 p-4 rounded-2xl bg-rose-500/10 text-rose-700 animate-fade-in-up">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <p class="text-sm font-bold">{{ error }}</p>
          </div>
        }

        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none transition-colors group-focus-within:text-amber-500 text-slate-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
          </div>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            required
            class="w-full pl-12 pr-6 py-4 bg-slate-50/50 hover:bg-slate-50 border border-slate-200/80 rounded-full text-slate-900 placeholder:text-slate-400 focus:bg-white focus:border-amber-500 focus:ring-4 focus:ring-amber-500/10 outline-none transition-all font-medium"
            placeholder="Seu e-mail de cadastro"
          />
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="w-full relative overflow-hidden group flex justify-center items-center gap-2 py-4 px-6 mt-6 bg-slate-900 hover:bg-amber-500 disabled:bg-slate-300 disabled:cursor-wait text-white font-bold text-lg rounded-full shadow-[0_8px_20px_rgba(0,0,0,0.15)] hover:shadow-[0_12px_25px_rgba(245,158,11,0.3)] hover:-translate-y-0.5 transition-all duration-300"
        >
          <div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-white/20 to-transparent group-hover:animate-[shimmer_1.5s_infinite]"></div>
          @if (loading) {
            <svg class="animate-spin h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          } @else {
            <span class="relative z-10">Enviar link mágico</span>
            <svg class="w-5 h-5 relative z-10 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
          }
        </button>
      </form>
    }

    <div class="mt-8 pt-6 border-t border-slate-200/60 text-center">
      <a routerLink="/login" class="text-slate-500 hover:text-slate-800 font-bold transition-colors">Voltar para o login</a>
    </div>
  </div>
</div>
